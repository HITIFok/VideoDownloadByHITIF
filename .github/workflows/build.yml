name: Build Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (no signing needed)
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloadByHITIF-debug
          path: app/build/outputs/apk/debug/*.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create signing keystore
        if: env.KEYSTORE_PASSWORD != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "android.signingConfigs.release.storeFile=app/release.keystore" >> local.properties
          echo "android.signingConfigs.release.storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "android.signingConfigs.release.keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "android.signingConfigs.release.keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloadByHITIF-release
          path: app/build/outputs/apk/release/*.apk
